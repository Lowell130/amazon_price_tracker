<!doctype html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <title>Amazon Price Tracker</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                sans-serif;
            margin: 0;
            padding: 12px;
            min-width: 320px;
            background: #f9fafb;
            color: #111827;
        }

        h1 {
            font-size: 16px;
            margin: 0 0 8px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .card {
            background: #ffffff;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.1);
            margin-bottom: 8px;
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
            font-weight: 500;
        }

        input,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            font-size: 13px;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.3);
        }

        .btn {
            border: none;
            border-radius: 9999px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(to right, #16a34a, #22c55e);
            color: white;
        }

        .btn-primary:hover {
            filter: brightness(0.95);
        }

        .btn-outline {
            background: white;
            color: #111827;
            border: 1px solid #d1d5db;
        }

        .btn-outline:hover {
            background: #f3f4f6;
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: space-between;
        }

        .mt-2 {
            margin-top: 8px;
        }

        .mt-3 {
            margin-top: 12px;
        }

        .text-xs {
            font-size: 11px;
        }

        .text-muted {
            color: #6b7280;
        }

        .product-url-box {
            background: #f3f4f6;
            border-radius: 6px;
            padding: 6px;
            font-size: 11px;
            max-height: 60px;
            overflow: auto;
            word-break: break-all;
            border-left: 3px solid transparent;
        }

        .product-url-box.already-tracked {
            border-left-color: #22c55e;
            background: #ecfdf3;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 500;
            background: #ecfdf3;
            color: #15803d;
        }

        .badge-secondary {
            background: #e5f0ff;
            color: #1d4ed8;
        }

        .asin-text {
            font-size: 12px;
            font-weight: 500;
            color: #111827;
        }

        /* Spinner per i bottoni */
        .spinner {
            width: 14px;
            height: 14px;
            border-radius: 9999px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: #ffffff;
            animation: spin 0.7s linear infinite;
        }

        .spinner-dark {
            border-color: rgba(55, 65, 81, 0.4);
            border-top-color: #374151;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast container (posizione fissa) */
        #toast-container {
            position: fixed;
            bottom: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 9999;
        }
    </style>
</head>

<body>
    <!-- LOGIN -->
    <section id="login-section" class="card">
        <h1>Accedi a Price Tracker</h1>
        <p class="subtitle">
            Usa lo stesso <strong>username o email</strong> e password che utilizzi
            sull'app web.
        </p>

        <div class="mt-2">
            <label for="username">Username o email</label>
            <input id="username" type="text" autocomplete="username" />
        </div>

        <div class="mt-2">
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" />
        </div>

        <div class="mt-3">
            <button id="login-btn" class="btn btn-primary" style="width: 100%">
                Accedi
            </button>
        </div>
    </section>

    <!-- PRODOTTO -->
    <section id="product-section" class="card" style="display: none">
        <div class="row">
            <div>
                <h1>Prodotto Amazon</h1>
                <span class="subtitle"> Verrà aggiunto al tuo account. </span>
            </div>
            <button id="logout-btn" class="btn btn-outline text-xs">Logout</button>
        </div>

        <div class="mt-2">
            <span class="badge">URL rilevato</span>
            <div id="product-url" class="product-url-box mt-2">
                Caricamento URL prodotto...
            </div>
        </div>

        <div class="mt-2 row" id="asin-row">
            <span class="badge badge-secondary">ASIN</span>
            <span id="asin-value" class="asin-text">-</span>
        </div>

        <p id="product-status" class="mt-1 text-xs text-muted"></p>

        <div class="mt-2">
            <label for="category">Categoria (opzionale)</label>
            <select id="category">
                <option value="">Nessuna categoria</option>
                <option value="Audio">Audio</option>
                <option value="Automotive">Automotive</option>
                <option value="Baby Products">Baby Products</option>
                <option value="Beauty Care">Beauty Care</option>
                <option value="Books">Books</option>
                <option value="Console">Console</option>
                <option value="DIY">DIY</option>
                <option value="Electronics">Electronics</option>
                <option value="Fashion">Fashion</option>
                <option value="Gaming">Gaming</option>
                <option value="Garden">Garden</option>
                <option value="Groceries">Groceries</option>
                <option value="Health & Wellness">Health & Wellness</option>
                <option value="Home">Home</option>
                <option value="Kitchen">Kitchen</option>
                <option value="Memory">Memory</option>
                <option value="Monitor">Monitor</option>
                <option value="Notebook">Notebook</option>
                <option value="Office Supplies">Office Supplies</option>
                <option value="PC">PC</option>
                <option value="Pets">Pets</option>
                <option value="Smart-TV">Smart-TV</option>
                <option value="Smartphones">Smartphones</option>
                <option value="Smartwatches">Smartwatches</option>
                <option value="Sports">Sports</option>
                <option value="Tablet">Tablet</option>
                <option value="Technology">Technology</option>
                <option value="Toys & Games">Toys & Games</option>
                <option value="Travel Gear">Travel Gear</option>
                <option value="Video">Video</option>
                <option value="Watch">Watch</option>
                <option value="WiFi">WiFi</option>
            </select>
        </div>

        <div class="mt-3">
            <button id="add-product" class="btn btn-primary" style="width: 100%">
                + Aggiungi al tracker
            </button>
        </div>

        <p class="mt-2 text-xs text-muted">
            I dati vengono inviati alla tua API locale
            <code>http://127.0.0.1:8000</code>.
        </p>
    </section>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <script src="popup.js"></script>
</body>

</html>
